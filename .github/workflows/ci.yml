name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# The Go module lives in ./server.
defaults:
  run:
    working-directory: server

jobs:
  test:
    name: vet + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          # Zero third-party dependencies -> no go.sum -> nothing to cache.
          cache: false
      - name: gofmt (check)
        run: test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go build
        run: go build -o /tmp/html-artifacts .

  create-release:
    name: create release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" \
            || gh release create "${{ github.ref_name }}" \
                 --repo "${{ github.repository }}" \
                 --title "${{ github.ref_name }}" \
                 --generate-notes

  release:
    name: release binaries
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          cache: false
      - name: build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          out="html-artifacts-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -trimpath -o "../$out" .
      - name: attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          out="html-artifacts-${{ matrix.goos }}-${{ matrix.goarch }}"
          gh release upload "${{ github.ref_name }}" "../$out" \
            --clobber --repo "${{ github.repository }}"
